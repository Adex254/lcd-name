name: Build ESP32 BIN

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Install Arduino CLI
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # Setup ESP32 core
      - name: Setup ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # Install LCD library
      - name: Install LCD library
        run: |
          arduino-cli lib install "LiquidCrystal I2C"

      # Compile (FORCE OUTPUT LOCATION)
      - name: Compile
        run: |
          mkdir build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir build \
            .

      # Merge BIN (NO GUESSING)
      - name: Merge BIN
        run: |
          pip install esptool

          esptool merge-bin -o firmware_merged.bin \
          --flash-mode dio --flash-freq 40m --flash-size 4MB \
          0x1000 build/bootloader.bin \
          0x8000 build/partitions.bin \
          0x10000 build/lcd-name.ino.bin

      # Upload BIN
      - name: Upload BIN
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware_merged.bin
