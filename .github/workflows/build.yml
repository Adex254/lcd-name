name: Build ESP32 Single BIN

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Arduino CLI
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      # ESP32 core
      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # Library
      - name: Install LCD library
        run: |
          arduino-cli lib install "LiquidCrystal I2C"

      # Compile
      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir build \
            .

      # Find correct build folder + merge
      - name: Merge to single BIN
        run: |
          pip install esptool

          BUILD_DIR=$(find build -type d -name "*esp32*" | head -n 1)

          echo "Using build dir: $BUILD_DIR"

          esptool merge-bin -o firmware_merged.bin \
          --flash-mode dio --flash-freq 40m --flash-size 4MB \
          0x1000 $BUILD_DIR/bootloader.bin \
          0x8000 $BUILD_DIR/partitions.bin \
          0x10000 $BUILD_DIR/*.bin

      # Upload
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware_merged.bin
